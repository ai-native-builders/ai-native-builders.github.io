project:
  type: website

website:
  title: "AI Native Builders"
  site-url: "https://ai-native-builders.github.io"
  site-path: "/"
  description: "AI Native Builders 팀의 스터디 허브와 업데이트를 모아두는 GitHub Pages 사이트"
  favicon: "static/favicon.svg"
  open-graph: true
  reader-mode: true
  navbar:
    logo: "static/logo.svg"
    collapse-below: lg
    right:
      - text: 홈
        href: index.qmd
      - text: 소개
        href: about.qmd
      - icon: github
        href: https://github.com/ai-native-builders
        aria-label: GitHub
      - icon: rss
        href: index.xml
  search:
    location: navbar
    type: overlay
  page-footer:
    left: |
      AI Native Builders
    right: |
      Built with [Quarto](https://quarto.org/) and [GitHub Pages](https://pages.github.com/)

format:
  html:
    theme: theme_light.scss
    css: styles.css
    toc: true
    smooth-scroll: true
    code-copy: true
    code-overflow: wrap
    highlight-style: github
    link-external-newwindow: true
    anchor-sections: true

execute:
  freeze: auto
